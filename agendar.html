<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agendador Full Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
<style>
/* RESET */
* { box-sizing: border-box; margin:0; padding:0; }
body { font-family: 'Inter', sans-serif; background: #0f172a; color: #f1f5f9; min-height: 100vh; padding: 30px 20px; }
h1 { text-align: center; color: #38bdf8; margin-bottom: 25px; }

/* CONTENEDOR */
.container { max-width: 800px; margin: auto; background: #1e293b; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }

/* FORMULARIO */
form label { display: block; margin-top: 15px; font-weight: 600; color: #e2e8f0; }
form input, form textarea { width: 100%; padding: 10px 15px; margin-top: 5px; border-radius: 8px; border: none; outline: none; font-size: 14px; background: #334155; color: #f1f5f9; }
form textarea { resize: none; }
button { margin-top: 20px; width: 100%; padding: 12px; border-radius: 10px; border: none; background: #0ea5e9; color: #fff; font-weight: 600; cursor: pointer; font-size: 16px; transition: all 0.3s ease; display: flex; justify-content: center; align-items: center; gap: 8px; }
button:hover { background: #38bdf8; transform: translateY(-2px); }

/* FILTRO */
.filtro { display: flex; gap: 10px; margin-top: 25px; }
.filtro input { flex: 1; padding:10px 15px; border-radius:8px; border:none; outline:none; background:#334155; color:#f1f5f9; }
.filtro button { padding: 10px 15px; border-radius: 8px; border:none; cursor:pointer; background:#0ea5e9; transition:0.3s; color:#fff; font-weight:600; }
.filtro button:hover { background:#38bdf8; }

/* LISTA DE CITAS */
.cita { background: #334155; margin-top: 20px; padding: 15px 20px; border-radius: 12px; position: relative; transition: all 0.3s ease; opacity: 0; transform: translateY(20px); animation: appear 0.5s forwards; }
@keyframes appear { to { opacity:1; transform: translateY(0); } }
.cita strong { color: #38bdf8; font-size: 16px; }
.cita p { margin: 5px 0 0 0; color: #cbd5e1; font-size: 14px; }

/* BOTONES CON ICONOS */
.actions { position: absolute; top: 15px; right: 15px; display: flex; gap: 8px; }
.actions button { width: auto; padding: 6px 10px; font-size: 14px; border-radius: 8px; font-weight:600; display:flex; align-items:center; gap:5px; cursor:pointer; transition:0.3s; }
.actions button.edit { background:#facc15; color:#1e293b; }
.actions button.edit:hover { background:#fde68a; }
.actions button.delete { background:#f87171; color:#1e293b; }
.actions button.delete:hover { background:#fca5a5; }

/* NOTIFICACIÓN */
#notificacion { position: fixed; top: 20px; right:20px; background:#0ea5e9; color:#fff; padding:15px 20px; border-radius:10px; box-shadow:0 5px 15px rgba(0,0,0,0.3); opacity:0; transform: translateY(-20px); transition: all 0.4s ease; z-index:1000; display:flex; align-items:center; gap:8px; font-weight:600; }
#notificacion.show { opacity:1; transform: translateY(0); }
</style>
</head>
<body>

<div class="container">
    <h1>Agendador Full Pro</h1>

    <form id="formCitas">
        <input type="hidden" id="idCita">
        <label for="nombre">Nombre:</label>
        <input type="text" id="nombre" required placeholder="Nombre de la cita">

        <label for="fecha">Fecha:</label>
        <input type="date" id="fecha" required>

        <label for="hora">Hora:</label>
        <input type="time" id="hora" required>

        <label for="descripcion">Descripción:</label>
        <textarea id="descripcion" rows="3" placeholder="Detalles de la cita"></textarea>

        <button type="submit">
            <!-- Icono SVG -->
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 5v14M5 12h14"></path>
            </svg>
            Agregar / Actualizar
        </button>
    </form>

    <!-- FILTRO -->
    <div class="filtro">
        <input type="date" id="filtroFecha">
        <button onclick="filtrarCitas()">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="11" cy="11" r="8"></circle>
                <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
            </svg>
            Filtrar
        </button>
        <button onclick="resetFiltro()">Mostrar Todas</button>
    </div>

    <div id="listaCitas"></div>
</div>

<div id="notificacion"></div>

<script>
let citas = JSON.parse(localStorage.getItem('citas')) || [];

const form = document.getElementById('formCitas');
const listaCitas = document.getElementById('listaCitas');
const idCitaInput = document.getElementById('idCita');
const filtroFecha = document.getElementById('filtroFecha');
const notificacion = document.getElementById('notificacion');

form.addEventListener('submit', function(e){
    e.preventDefault();
    const nombre = document.getElementById('nombre').value;
    const fecha = document.getElementById('fecha').value;
    const hora = document.getElementById('hora').value;
    const descripcion = document.getElementById('descripcion').value;
    const id = idCitaInput.value;

    if(id){
        const index = citas.findIndex(c=>c.id==id);
        citas[index]={id,nombre,fecha,hora,descripcion};
        mostrarNotificacion("Cita actualizada ✅");
        idCitaInput.value='';
    } else {
        citas.push({id:Date.now(),nombre,fecha,hora,descripcion});
        mostrarNotificacion("Cita agregada ✅");
    }

    guardarYMostrar();
    form.reset();
});

function guardarYMostrar(){
    citas.sort((a,b)=> new Date(a.fecha+'T'+a.hora) - new Date(b.fecha+'T'+b.hora));
    localStorage.setItem('citas', JSON.stringify(citas));
    mostrarCitas(citas);
}

function mostrarCitas(lista){
    listaCitas.innerHTML='';
    lista.forEach(cita=>{
        const div=document.createElement('div');
        div.classList.add('cita');
        div.innerHTML=`
            <strong>${cita.nombre}</strong> - ${cita.fecha} ${cita.hora}
            <p>${cita.descripcion}</p>
            <div class="actions">
                <button class="edit" onclick="editarCita(${cita.id})">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 20h9"></path>
                        <path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"></path>
                    </svg>
                    Editar
                </button>
                <button class="delete" onclick="eliminarCita(${cita.id})">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="3 6 5 6 21 6"></polyline>
                        <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"></path>
                        <path d="M10 11v6M14 11v6"></path>
                    </svg>
                    Eliminar
                </button>
            </div>
        `;
        listaCitas.appendChild(div);
    });
}

function editarCita(id){
    const cita=citas.find(c=>c.id===id);
    document.getElementById('nombre').value=cita.nombre;
    document.getElementById('fecha').value=cita.fecha;
    document.getElementById('hora').value=cita.hora;
    document.getElementById('descripcion').value=cita.descripcion;
    idCitaInput.value=cita.id;
}

function eliminarCita(id){
    citas=citas.filter(c=>c.id!==id);
    mostrarNotificacion("Cita eliminada ❌");
    guardarYMostrar();
}

function filtrarCitas(){
    const fecha=filtroFecha.value;
    if(!fecha) return;
    const filtradas=citas.filter(c=>c.fecha===fecha);
    mostrarCitas(filtradas);
}

function resetFiltro(){
    filtroFecha.value='';
    mostrarCitas(citas);
}

function mostrarNotificacion(msg){
    notificacion.textContent=msg;
    notificacion.classList.add('show');
    setTimeout(()=>{ notificacion.classList.remove('show'); }, 2500);
}

// Mostrar citas guardadas al iniciar
guardarYMostrar();
</script>

</body>
</html>
